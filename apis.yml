position: Consumer
description: >-
  Backblaze is a cloud storage and data backup provider offering B2 Cloud Storage - a
  low-cost, S3-compatible object storage service. Backblaze provides both a native B2
  API and an S3-compatible API, enabling developers to build applications that store
  unlimited data at a fraction of major cloud provider costs. Features include file
  versioning, lifecycle rules, event notifications, object lock, cross-region replication,
  and a Cloudflare bandwidth alliance for zero-egress CDN delivery.
