  https://raw.githubusercontent.com/api-evangelist/backblaze/refs/heads/main/apis.yml
apis:
  - aid: backblaze:backblaze-b2-cloud-storage-api
    name: Backblaze B2 Cloud Storage API
    tags:
      - Cloud Storage
      - Object Storage
      - Storage
    humanURL: https://www.backblaze.com/b2/cloud-storage.html
    properties:
      - type: Documentation
        url: https://www.backblaze.com/apidocs/introduction-to-the-b2-native-api
      - type: GettingStarted
        url: https://www.backblaze.com/docs/cloud-storage-native-api
      - type: OpenAPI
        url: openapi/backblaze-b2-native-api.yaml
    description: >-
      The Backblaze B2 Native API provides programmatic access to all B2 Cloud Storage
      functions including account authorization, bucket management, file upload and download,
      large file multi-part uploads, application key management, lifecycle rules, replication,
      and event notifications. Uses HTTP Basic authentication to obtain authorization tokens
      for subsequent API calls. API v4 is the current stable version.
  - aid: backblaze:backblaze-s3-compatible-api
    name: Backblaze S3-Compatible API
    tags:
      - Cloud Storage
      - Object Storage
      - S3 Compatible
    humanURL: https://www.backblaze.com/apidocs/introduction-to-the-s3-compatible-api
    properties:
      - type: Documentation
        url: https://www.backblaze.com/apidocs/introduction-to-the-s3-compatible-api
      - type: APIReference
        url: https://www.backblaze.com/docs/cloud-storage-call-the-s3-compatible-api
    description: >-
      The Backblaze S3-Compatible API allows existing applications built for Amazon S3
      to work with Backblaze B2 Cloud Storage with minimal code changes. Supports S3
      authentication (AWS Signature V4) and S3 API operations for bucket and object
      management. Endpoint URLs follow the pattern s3.<region>.backblazeb2.com.
