          example: photos/
        validDurationInSeconds:
          type: integer
          description: Duration (1 to 604800) the token is valid
          example: 3600
    GetDownloadAuthorizationResponse:
      title: GetDownloadAuthorizationResponse
      type: object
      properties:
        bucketId:
          type: string
          example: e73ede9969c64355ef8b
        fileNamePrefix:
          type: string
          example: photos/
        authorizationToken:
          type: string
          example: 3_en0Y0j2f-0r0BVLS8vN9GJTWA-pLEP
    StartLargeFileRequest:
      title: StartLargeFileRequest
