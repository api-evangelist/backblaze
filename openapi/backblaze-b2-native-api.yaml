    CreateKeyRequest:
      title: CreateKeyRequest
      type: object
      required:
        - accountId
        - capabilities
        - keyName
      properties:
        accountId:
          type: string
          example: abc123def456
        capabilities:
          type: array
          items:
            type: string
          description: List of capabilities for the key
        keyName:
          type: string
          description: A name for the key (letters, numbers, hyphens)
          example: my-app-key
        validDurationInSeconds:
          type: integer
          description: Duration before key expires
        bucketId:
          type: string
          description: Restrict key to this bucket
        namePrefix:
          type: string
          description: Restrict key to files with this prefix
    DeleteKeyRequest:
      title: DeleteKeyRequest
      type: object
      required:
        - applicationKeyId
      properties:
        applicationKeyId:
          type: string
          description: The ID of the key to delete
          example: 0014a98f9d9e8d0000000001
    ListKeysRequest:
      title: ListKeysRequest
      type: object
      required:
        - accountId
      properties:
        accountId:
          type: string
          example: abc123def456
        maxKeyCount:
          type: integer
          description: Maximum number of keys to return
        startApplicationKeyId:
          type: string
          description: Start listing from this key ID
    ListKeysResponse:
      title: ListKeysResponse
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationKey'
