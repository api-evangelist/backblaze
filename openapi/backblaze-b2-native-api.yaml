      title: GetBucketNotificationRulesRequest
      type: object
      required:
        - bucketId
      properties:
        bucketId:
          type: string
          example: e73ede9969c64355ef8b
    SetBucketNotificationRulesRequest:
      title: SetBucketNotificationRulesRequest
      type: object
      required:
        - bucketId
        - rules
      properties:
        bucketId:
          type: string
          example: e73ede9969c64355ef8b
        rules:
          type: array
          items:
            $ref: '#/components/schemas/NotificationRule'
    NotificationRule:
      title: NotificationRule
      type: object
      properties:
        name:
          type: string
          description: Name for this notification rule
          example: my-notification
        eventTypes:
          type: array
          items:
            type: string
          description: Event types that trigger this notification
          example:
            - b2:ObjectCreated:Upload
        isEnabled:
          type: boolean
          description: Whether this rule is enabled
          example: true
        targetConfiguration:
          type: object
          properties:
            targetType:
              type: string
              enum:
                - url
              description: Type of notification target
            url:
              type: string
              description: Webhook URL to send notifications to
              example: https://my-app.example.com/webhooks/b2
    BucketNotificationRulesResponse:
      title: BucketNotificationRulesResponse
      type: object
      properties:
        bucketId:
          type: string
          example: e73ede9969c64355ef8b
        rules:
          type: array
          items:
            $ref: '#/components/schemas/NotificationRule'
    ErrorResponse:
      title: ErrorResponse
      type: object
      description: Standard B2 error response
      properties:
        status:
          type: integer
          description: HTTP status code
          example: 401
        code:
          type: string
          description: A single-identifier code that identifies the error
          example: unauthorized
        message:
          type: string
          description: A human-readable message describing the error
          example: Authorization token not valid
