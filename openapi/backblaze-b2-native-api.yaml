          type: string
          nullable: true
        nextFileId:
          type: string
          nullable: true
    CopyFileRequest:
      title: CopyFileRequest
      type: object
      required:
        - sourceFileId
        - fileName
      properties:
        sourceFileId:
          type: string
          description: The ID of the file to copy
          example: 4_h4a48fe8875c6214145260818
        fileName:
          type: string
          description: The name for the new file
          example: photos/image-copy.jpg
        destinationBucketId:
          type: string
          description: Bucket ID to copy to (defaults to source bucket)
        range:
          type: string
          description: Byte range to copy
        metadataDirective:
          type: string
          enum:
            - COPY
            - REPLACE
          description: Whether to copy or replace metadata
    HideFileRequest:
      title: HideFileRequest
      type: object
      required:
        - bucketId
        - fileName
      properties:
        bucketId:
          type: string
          description: The bucket containing the file
          example: e73ede9969c64355ef8b
        fileName:
          type: string
          description: The name of the file to hide
          example: photos/image.jpg
    GetDownloadAuthorizationRequest:
      title: GetDownloadAuthorizationRequest
      type: object
      required:
        - bucketId
