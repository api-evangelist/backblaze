components:
  securitySchemes:
    ApplicationKeyAuth:
      type: http
      scheme: bearer
      description: Authorization token obtained from b2_authorize_account
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic auth using applicationKeyId as username and applicationKey as password
  schemas:
    AuthorizeAccountResponse:
      title: AuthorizeAccountResponse
      type: object
      description: Response from the b2_authorize_account operation
      properties:
        accountId:
          type: string
          description: The identifier for the account
          example: abc123def456
        authorizationToken:
          type: string
          description: An authorization token to use with all calls other than b2_authorize_account
          example: 4_002acd2a08df7f8c0c4d21e9deef28c7
        allowed:
          $ref: '#/components/schemas/AllowedCapabilities'
        apiInfo:
          $ref: '#/components/schemas/ApiInfo'
    AllowedCapabilities:
      title: AllowedCapabilities
      type: object
      description: What the credentials allow
      properties:
        capabilities:
          type: array
          items:
            type: string
          description: A list of capabilities
        bucketId:
          type: string
          nullable: true
          description: Bucket ID restricted to, or null
        bucketName:
          type: string
          nullable: true
          description: Bucket name restricted to, or null
        namePrefix:
          type: string
          nullable: true
          description: File name prefix restriction, or null
    ApiInfo:
      title: ApiInfo
      type: object
      description: API endpoint information
      properties:
        storageApi:
          type: object
          properties:
            absoluteMinimumPartSize:
              type: integer
              description: Minimum part size in bytes for large files
              example: 5000000
            recommendedPartSize:
              type: integer
              description: Recommended part size in bytes
              example: 100000000
            apiUrl:
              type: string
              description: URL to use for subsequent API calls
              example: https://api005.backblazeb2.com
            downloadUrl:
              type: string
              description: URL to use for downloading files
              example: https://f005.backblazeb2.com
            s3ApiUrl:
              type: string
              description: S3-compatible API URL
              example: https://s3.us-west-004.backblazeb2.com
    Bucket:
      title: Bucket
      type: object
      description: Represents a B2 bucket
      properties:
        accountId:
          type: string
          description: The account that owns the bucket
          example: abc123def456
        bucketId:
          type: string
          description: The unique ID of the bucket
          example: e73ede9969c64355ef8b
        bucketName:
          type: string
          description: The unique name of the bucket
          example: my-media-bucket
        bucketType:
          type: string
          enum:
            - allPublic
            - allPrivate
            - snapshot
          description: The bucket privacy setting
          example: allPrivate
        bucketInfo:
          type: object
          description: User-defined information stored with the bucket
        corsRules:
          type: array
          items:
            type: object
          description: CORS rules for the bucket
        lifecycleRules:
          type: array
          items:
            type: object
          description: Lifecycle rules for the bucket
        revision:
          type: integer
          description: The number of times the bucket info has been modified
          example: 1
    FileInfo:
      title: FileInfo
      type: object
      description: Information about a stored file
      properties:
        fileId:
          type: string
          description: The unique identifier for this version of this file
          example: 4_h4a48fe8875c6214145260818
        fileName:
          type: string
          description: The name of the file
          example: photos/image.jpg
        accountId:
          type: string
          description: The account that owns the file
          example: abc123def456
        bucketId:
          type: string
          description: The bucket that the file is in
          example: e73ede9969c64355ef8b
        contentLength:
          type: integer
          description: The size of the file in bytes
          example: 102400
        contentSha1:
          type: string
          description: The SHA1 checksum of the bytes in the file
          example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
        contentType:
          type: string
          description: The MIME type of the file
          example: image/jpeg
        fileInfo:
          type: object
          description: Custom information about the file
        action:
          type: string
          enum:
            - upload
            - hide
            - start
            - copy
          description: The action that created this file version
          example: upload
        uploadTimestamp:
          type: integer
          description: Milliseconds since midnight, January 1, 1970 UTC
          example: 1660000000000
    ApplicationKey:
      title: ApplicationKey
      type: object
      description: A Backblaze B2 application key
      properties:
        keyName:
          type: string
          description: A name for this key
          example: my-app-key
        applicationKeyId:
          type: string
          description: The ID of the newly created key
          example: 0014a98f9d9e8d0000000001
        applicationKey:
          type: string
          description: The secret key - only returned at creation time
          example: K0014a98f9d9e8d0000000001a9b2c3d4
        accountId:
          type: string
          description: The account this key is associated with
          example: abc123def456
        capabilities:
          type: array
          items:
            type: string
          description: A list of capabilities this key has
        expirationTimestamp:
          type: integer
          nullable: true
          description: When this key expires, or null for no expiration
        bucketId:
          type: string
          nullable: true
          description: Restrict key to this bucket, or null for all buckets
        namePrefix:
          type: string
          nullable: true
          description: Restrict key to file names starting with this prefix
    CreateBucketRequest:
      title: CreateBucketRequest
      type: object
      required:
        - accountId
        - bucketName
        - bucketType
      properties:
        accountId:
          type: string
          description: The account ID
          example: abc123def456
        bucketName:
          type: string
          description: The name of the new bucket
          example: my-media-bucket
        bucketType:
          type: string
          enum:
            - allPublic
            - allPrivate
          description: Privacy setting for the bucket
          example: allPrivate
        bucketInfo:
          type: object
          description: User-defined info to store with the bucket
        corsRules:
          type: array
          items:
            type: object
          description: CORS rules for the bucket
        lifecycleRules:
          type: array
          items:
            type: object
          description: Lifecycle rules for the bucket
    DeleteBucketRequest:
      title: DeleteBucketRequest
      type: object
      required:
        - accountId
        - bucketId
      properties:
        accountId:
          type: string
          description: The account ID
          example: abc123def456
        bucketId:
          type: string
          description: The ID of the bucket to delete
          example: e73ede9969c64355ef8b
    ListBucketsRequest:
      title: ListBucketsRequest
      type: object
      required:
        - accountId
      properties:
        accountId:
          type: string
          description: The account ID
          example: abc123def456
        bucketId:
          type: string
          description: Filter to a specific bucket
        bucketName:
          type: string
          description: Filter by bucket name
        bucketTypes:
          type: array
          items:
            type: string
          description: Filter by bucket type
    ListBucketsResponse:
      title: ListBucketsResponse
      type: object
      properties:
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/Bucket'
    UpdateBucketRequest:
      title: UpdateBucketRequest
      type: object
      required:
        - accountId
        - bucketId
      properties:
        accountId:
          type: string
          description: The account ID
          example: abc123def456
        bucketId:
          type: string
          description: The ID of the bucket to update
          example: e73ede9969c64355ef8b
        bucketType:
          type: string
          enum:
            - allPublic
            - allPrivate
          description: New privacy setting
        bucketInfo:
          type: object
          description: New bucket info
        corsRules:
          type: array
          items:
            type: object
          description: New CORS rules
        lifecycleRules:
          type: array
          items:
            type: object
          description: New lifecycle rules
        ifRevisionIs:
          type: integer
          description: Only update if bucket revision matches this value
    GetUploadUrlRequest:
      title: GetUploadUrlRequest
      type: object
      required:
        - bucketId
      properties:
        bucketId:
          type: string
          description: The ID of the bucket to upload to
          example: e73ede9969c64355ef8b
    GetUploadUrlResponse:
      title: GetUploadUrlResponse
      type: object
      properties:
        bucketId:
          type: string
          example: e73ede9969c64355ef8b
        uploadUrl:
          type: string
          example: https://pod-000-1005-03.backblaze.com/b2api/v4/b2_upload_file
        authorizationToken:
          type: string
          example: 3_en0Y0j2f-0r0BVLS8vN9GJTWA-pLEP
    GetFileInfoRequest:
      title: GetFileInfoRequest
      type: object
      required:
        - fileId
      properties:
        fileId:
          type: string
          description: The ID of the file
          example: 4_h4a48fe8875c6214145260818
    DeleteFileVersionRequest:
      title: DeleteFileVersionRequest
      type: object
      required:
        - fileName
        - fileId
      properties:
        fileName:
          type: string
          description: The name of the file
          example: photos/image.jpg
        fileId:
          type: string
          description: The ID of the file version to delete
          example: 4_h4a48fe8875c6214145260818
        bypassGovernance:
          type: boolean
          description: Set to true to bypass object lock governance mode
    DeleteFileVersionResponse:
      title: DeleteFileVersionResponse
      type: object
      properties:
        fileId:
          type: string
          example: 4_h4a48fe8875c6214145260818
        fileName:
          type: string
          example: photos/image.jpg
    ListFileNamesRequest:
      title: ListFileNamesRequest
      type: object
      required:
        - bucketId
      properties:
        bucketId:
          type: string
          description: The bucket to list
          example: e73ede9969c64355ef8b
        startFileName:
          type: string
          description: Start listing from this file name
        maxFileCount:
          type: integer
          description: Maximum number of files to return (1-10000)
          example: 100
        prefix:
          type: string
          description: Prefix to filter file names
        delimiter:
          type: string
          description: Delimiter used for virtual folder simulation
    ListFileNamesResponse:
      title: ListFileNamesResponse
      type: object
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileInfo'
        nextFileName:
          type: string
